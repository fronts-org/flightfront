<section><h1 class="section-title">Gestion des passagers</h1><p class="section-subtitle">Suivez les profils clients, leur niveau de fidélité et leur activité.</p><div class="grid cards"><article class="card passenger-card" *ngFor="let passenger of passengers"><h3>{{ passenger.fullName }}</h3><p>{{ passenger.email }}</p><div class="meta"><span class="badge">{{ passenger.loyaltyLevel }}</span><span>{{ passenger.totalTrips }} trajets</span></div></article></div></section>
