<section><div class="header-row"><div><h1 class="section-title">Notifications</h1><p class="section-subtitle">Préparez, planifiez et suivez les communications envoyées aux utilisateurs.</p></div><button class="btn">Nouvelle notification</button></div><div class="grid cards"><article class="card item" *ngFor="let item of notifications"><div class="row"><h3>{{ item.title }}</h3><span class="badge">{{ item.status }}</span></div><p><strong>Canal :</strong> {{ item.channel }}</p><p><strong>Audience :</strong> {{ item.audience }}</p><p><strong>Créée le :</strong> {{ item.createdAt }}</p></article></div></section>
