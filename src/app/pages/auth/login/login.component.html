<section class="auth-shell"><div class="auth-card glass-card"><h1>Connexion</h1><p class="subtitle">Connectez-vous avec votre nom d'utilisateur ou votre email.</p><form class="auth-form" (ngSubmit)="submit()"><label class="field"><span>Nom d'utilisateur ou email</span><input type="text" [(ngModel)]="form.username" name="username" required /></label><label class="field"><span>Mot de passe</span><input type="password" [(ngModel)]="form.password" name="password" required /></label><p class="error" *ngIf="errorMessage">{{ errorMessage }}</p><button class="primary-btn" type="submit" [disabled]="isLoading">{{ isLoading ? 'Connexion...' : 'Se connecter' }}</button><div class="links"><a routerLink="/register">Créer un compte</a><a routerLink="/forgot-password">Mot de passe oublié</a></div></form></div></section>
