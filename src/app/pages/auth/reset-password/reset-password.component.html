<section class="auth-shell"><div class="auth-card glass-card"><h1>Réinitialiser le mot de passe</h1><form class="auth-form" (ngSubmit)="submit()"><label class="field"><span>Email</span><input type="email" [(ngModel)]="form.email" name="email" required /></label><label class="field"><span>Token</span><input type="text" [(ngModel)]="form.token" name="token" required /></label><label class="field"><span>Nouveau mot de passe</span><input type="password" [(ngModel)]="form.newPassword" name="newPassword" required /></label><label class="field"><span>Confirmer le mot de passe</span><input type="password" [(ngModel)]="form.confirmPassword" name="confirmPassword" required /></label><p class="error" *ngIf="errorMessage">{{ errorMessage }}</p><p class="success" *ngIf="infoMessage">{{ infoMessage }}</p><button class="primary-btn" type="submit">Valider</button></form></div></section>
