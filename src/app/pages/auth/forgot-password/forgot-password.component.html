<section class="auth-shell"><div class="auth-card glass-card"><h1>Mot de passe oublié</h1><form class="auth-form" (ngSubmit)="submit()"><label class="field"><span>Email</span><input type="email" [(ngModel)]="email" name="email" required /></label><p class="error" *ngIf="errorMessage">{{ errorMessage }}</p><p class="success" *ngIf="infoMessage">{{ infoMessage }}</p><div class="demo-token" *ngIf="resetToken"><strong>Token démo :</strong> {{ resetToken }}</div><button class="primary-btn" type="submit">Envoyer</button></form></div></section>
