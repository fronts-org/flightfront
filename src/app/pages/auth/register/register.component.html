<section class="auth-shell"><div class="auth-card glass-card"><h1>Créer un compte</h1><form class="auth-form" (ngSubmit)="submit()"><label class="field"><span>Nom d'utilisateur</span><input type="text" [(ngModel)]="form.username" name="username" required /></label><label class="field"><span>Email</span><input type="email" [(ngModel)]="form.email" name="email" required /></label><label class="field"><span>Prénom</span><input type="text" [(ngModel)]="form.firstName" name="firstName" /></label><label class="field"><span>Nom</span><input type="text" [(ngModel)]="form.lastName" name="lastName" /></label><label class="field"><span>Téléphone</span><input type="text" [(ngModel)]="form.phoneNumber" name="phoneNumber" /></label><label class="field"><span>Mot de passe</span><input type="password" [(ngModel)]="form.password" name="password" required /></label><label class="field"><span>Confirmer le mot de passe</span><input type="password" [(ngModel)]="form.confirmPassword" name="confirmPassword" required /></label><p class="error" *ngIf="errorMessage">{{ errorMessage }}</p><p class="success" *ngIf="infoMessage">{{ infoMessage }}</p><button class="primary-btn" type="submit" [disabled]="isLoading">{{ isLoading ? 'Création...' : 'Créer le compte' }}</button><a routerLink="/login">Déjà inscrit ? Se connecter</a></form></div></section>
